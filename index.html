<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Dream of the Two Princesses</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="game" aria-live="polite">
      <img id="background" alt="" />
      <button id="target" aria-label="Story target"></button>
      <section id="panel">
        <h1 id="title"></h1>
        <p id="body"></p>
        <p id="task"></p>
      </section>
      <p id="progress"></p>
      <button id="continue">Keep Going</button>
      <section id="cutscene" hidden>
        <img id="cutscene-frame" alt="Emily flying toward the castle on a dragon" />
        <p>Emily flies with Jax toward the castle tower.</p>
        <button id="skip">Continue</button>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
